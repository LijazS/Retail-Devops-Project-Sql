apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: retail-route
  namespace: re-ns
spec:
  parentRefs:
    - name: new-gateway
      namespace: l-ns
  rules:
    # Rule 1 → /retail
    - matches:
        - path:
            type: PathPrefix
            value: /retail
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: capsule-service
          port: 80

    # Rule 2 → /register
    - matches:
        - path:
            type: PathPrefix
            value: /register
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: capsule-service
          port: 80